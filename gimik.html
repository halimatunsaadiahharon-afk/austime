<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gimik Perasmian Autisme 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; background: #000; 
        }

        .video-layers {
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transition: opacity 1.5s ease;
        }

        #video-loop { z-index: 2; opacity: 1; }
        
        #video-count { 
            z-index: 3; 
            display: none; 
            opacity: 0; 
            transition: opacity 1.5s ease; 
        }

        #main-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10; display: flex;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0); 
            transition: background 2s ease;
            cursor: pointer;
        }

        #start-prompt {
            font-size: 1rem; letter-spacing: 5px; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8); text-align: center;
            animation: breathe 2s infinite ease-in-out;
            z-index: 15;
            transition: opacity 0.5s ease;
        }

        #official-card {
            display: none; opacity: 0;
            width: 90%; max-width: 1100px;
            text-align: center; z-index: 20;
            transform: translateY(30px);
            transition: opacity 2s ease, transform 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        h1 { color: #fff; font-size: clamp(1.8rem, 4.5vw, 3.5rem); font-weight: 900; margin: 10px 0; line-height: 1.2; text-shadow: 0 5px 25px rgba(0,0,0,0.9); }
        h2 { color: #FFCA3A; font-size: clamp(0.9rem, 2vw, 1.5rem); letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; font-weight: 700; }
        .separator { width: 180px; height: 6px; background: linear-gradient(90deg, #FF595E, #FFCA3A, #8AC926, #1982C4); margin: 25px auto; border-radius: 10px; }
        .vip-name { font-size: clamp(1.2rem, 3vw, 2.3rem); font-weight: 800; color: #fff; margin: 10px 0; text-transform: uppercase; line-height: 1.3; }
        .vip-role { color: #8AC926; font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        @keyframes breathe { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        #exit-btn { position: fixed; top: 10px; right: 10px; z-index: 100; color: rgba(255,255,255,0.1); cursor: pointer; border:none; background:none; font-family: sans-serif; }
    </style>
</head>
<body>

    <video id="video-loop" class="video-layers" playsinline loop muted>
        <source src="video.mp4" type="video/mp4">
    </video>

    <video id="video-count" class="video-layers" playsinline>
        <source src="count.mp4" type="video/mp4">
    </video>

    <audio id="audio-loop" loop><source src="audio1.mp3" type="audio/mpeg"></audio>
    <audio id="audio-count"><source src="audio.mp3" type="audio/mpeg"></audio>
    <audio id="audio-final"><source src="audio3.mp3" type="audio/mpeg"></audio>

    <button id="exit-btn" onclick="location.reload()">X</button>

    <div id="main-overlay" onclick="handleInteraction()">
        <div id="start-prompt">[ KLIK UNTUK MELETAKKAN KEPINGAN TERAKHIR ]</div>

        <div id="official-card">
            <h2>TEMA: "AUTISM AND HUMANITY - EVERY LIFE HAS VALUE"</h2>
            <h1>MAJLIS SAMBUTAN<br>HARI KESEDARAN AUTISME 2026</h1>
            <div class="separator"></div>
            <div style="color:#ddd; letter-spacing:3px; font-size: 0.8rem; margin-bottom: 5px;">DIRASMIKAN OLEH:</div>
            <div class="vip-name">TUAN YAZLAN SUNARDIE BIN CHE YAHAYA, <br><span style="font-size: 0.7em;">AMK., BCK., BKM.</span></div>
            <div class="vip-role">Pegawai Daerah Baling</div>
        </div>
    </div>

    <script>
        const vLoop = document.getElementById('video-loop');
        const vCount = document.getElementById('video-count');
        const aLoop = document.getElementById('audio-loop');
        const aCount = document.getElementById('audio-count');
        const aFinal = document.getElementById('audio-final');
        const prompt = document.getElementById('start-prompt');
        const card = document.getElementById('official-card');
        const overlay = document.getElementById('main-overlay');

        let currentPhase = 0; 
        let wordingTriggered = false;

        window.onload = () => { 
            vLoop.play().catch(e => console.log("Menunggu interaksi")); 
        };

        function handleInteraction() {
            if (currentPhase === 0) {
                vLoop.play();
                aLoop.play();
                prompt.style.opacity = "0";
                setTimeout(() => { prompt.style.display = "none"; }, 500);
                currentPhase = 1;

                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
            } 
            else if (currentPhase === 1) {
                currentPhase = 2;
                aLoop.pause();
                
                vCount.style.display = 'block';
                setTimeout(() => { vCount.style.opacity = "1"; }, 50); 
                
                vCount.play();
                aCount.play();

                vCount.ontimeupdate = function() {
                    let timeLeft = vCount.duration - vCount.currentTime;
                    // Mula fade out countdown dan panggil wording 3 saat sebelum tamat
                    if (timeLeft <= 3 && !wordingTriggered) {
                        wordingTriggered = true;
                        vCount.style.opacity = "0"; 
                        showWordingImmediate(); 
                    }
                };
            }
        }

        function showWordingImmediate() {
            aCount.pause();
            aFinal.play();

            vLoop.style.display = 'block';
            vLoop.style.opacity = '0.4'; 
            
            overlay.style.background = "rgba(0, 0, 0, 0.7)";
            card.style.display = "block";
            
            setTimeout(() => {
                card.style.opacity = "1";
                card.style.transform = "translateY(0)";
            }, 50);

            setTimeout(() => {
                vCount.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
